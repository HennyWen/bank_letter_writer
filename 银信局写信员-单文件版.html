<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>银信局写信员</title>
    <style>:root {
  font-family: "Noto Serif SC", "Songti SC", "SimSun", serif;
  color: #261d16;
  background: #d9d0bd;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  --ink: #261d16;
  --muted: #6f6254;
  --paper: #f5ecd9;
  --paper-strong: #fff8e8;
  --line: rgba(63, 45, 31, 0.22);
  --red: #8d2f25;
  --teal: #236765;
  --green: #46754d;
  --gold: #b48335;
  --shadow: 0 18px 50px rgba(56, 38, 21, 0.18);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
  background:
    linear-gradient(rgba(84, 62, 39, 0.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(84, 62, 39, 0.12) 1px, transparent 1px),
    radial-gradient(circle at 20% 15%, rgba(255, 248, 219, 0.65), transparent 35%),
    #d9d0bd;
  background-size: 36px 36px, 36px 36px, auto, auto;
}

button,
textarea {
  font: inherit;
}

button {
  border: 1px solid var(--line);
  background: #efe2c5;
  color: var(--ink);
  min-height: 42px;
  padding: 0 14px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  box-shadow: inset 0 -2px 0 rgba(61, 42, 21, 0.09);
}

button:hover {
  background: #f7e8c8;
}

button:disabled {
  opacity: 0.48;
  cursor: not-allowed;
}

input {
  font: inherit;
}

.app {
  width: min(1440px, 100%);
  min-height: 100vh;
  margin: 0 auto;
  padding: 18px;
}

.topbar {
  height: 82px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  background: rgba(252, 244, 224, 0.88);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 18px;
  box-shadow: var(--shadow);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 220px;
}

.seal {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: var(--red);
  color: #fff8e8;
  display: grid;
  place-items: center;
  font-weight: 800;
  border: 2px solid rgba(255, 248, 232, 0.8);
}

.brand p,
.brand h1 {
  margin: 0;
}

.brand p,
.eyebrow {
  color: var(--red);
  font-size: 13px;
  letter-spacing: 0;
}

.brand h1 {
  font-size: 25px;
  line-height: 1.1;
}

.metrics {
  display: flex;
  align-items: stretch;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.metrics > div {
  min-width: 108px;
  min-height: 44px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: rgba(255, 250, 235, 0.7);
  color: #3d3127;
}

.tool-toggle {
  min-width: 84px;
  background: #f6edda;
}

.dialogue-layout {
  display: grid;
  grid-template-columns: 244px minmax(420px, 1fr);
  gap: 16px;
  margin-top: 16px;
  min-height: calc(100vh - 116px);
}

.dialogue-layout.paper-open {
  grid-template-columns: 220px minmax(430px, 0.9fr) minmax(390px, 0.78fr);
}

.queue-rail,
.dialogue-stage,
.letter-panel,
.summary-panel {
  background: rgba(252, 244, 224, 0.92);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.queue-rail,
.dialogue-stage,
.letter-panel {
  padding: 16px;
  min-height: 0;
}

.dialogue-stage {
  position: relative;
  min-height: 700px;
  overflow: hidden;
  display: grid;
  align-items: center;
  background:
    linear-gradient(to bottom, rgba(32, 81, 79, 0.1), rgba(74, 49, 30, 0.08)),
    linear-gradient(to bottom, transparent 0 58%, rgba(64, 43, 25, 0.2) 58% 100%),
    rgba(252, 244, 224, 0.94);
}

.panel-title {
  height: 32px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-weight: 700;
  margin-bottom: 12px;
}

.queue-card {
  min-height: 76px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 10px;
  background: rgba(255, 250, 235, 0.64);
}

.queue-card.active {
  background: #f5e2ba;
  border-color: rgba(141, 47, 37, 0.35);
}

.queue-card div:first-child {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.queue-card strong {
  font-size: 17px;
}

.queue-card span {
  color: var(--muted);
  font-size: 13px;
}

.queue-card b {
  display: inline-flex;
  margin-top: 10px;
  color: var(--red);
  font-size: 13px;
}

.queue-scene {
  position: relative;
  min-height: calc(100vh - 190px);
  overflow-y: auto;
  overflow-x: hidden;
  border: 1px solid rgba(63, 45, 31, 0.18);
  border-radius: 8px;
  background:
    linear-gradient(to bottom, rgba(255, 248, 232, 0.78), rgba(221, 207, 177, 0.76)),
    repeating-linear-gradient(to bottom, transparent 0 72px, rgba(63, 45, 31, 0.06) 73px);
}

.queue-scene::after {
  content: "";
  display: block;
  height: 980px;
}

.counter-marker {
  position: absolute;
  top: 14px;
  left: 14px;
  right: 14px;
  height: 42px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(141, 47, 37, 0.28);
  border-radius: 6px;
  color: var(--red);
  background: rgba(245, 226, 186, 0.72);
  font-weight: 800;
}

.queue-line {
  position: absolute;
  top: 74px;
  bottom: 18px;
  left: 50%;
  width: 2px;
  border-left: 2px dashed rgba(63, 45, 31, 0.18);
}

.queue-person {
  position: absolute;
  left: 50%;
  top: calc(78px + var(--step) * 104px);
  width: min(196px, calc(100% - 28px));
  transform: translateX(-50%);
  display: grid;
  grid-template-columns: 76px 1fr;
  align-items: center;
  gap: 8px;
}

.queue-person.at-counter {
  top: 70px;
}

.queue-character {
  position: relative;
  width: 76px;
  display: grid;
  justify-items: center;
}

.queue-image-placeholder {
  width: 62px;
  height: 62px;
  border: 2px dashed rgba(38, 29, 22, 0.25);
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 42%, rgba(255, 248, 232, 0.98) 0 18%, transparent 19%),
    radial-gradient(circle at 50% 50%, rgba(35, 103, 101, 0.34) 0 50%, transparent 51%),
    linear-gradient(160deg, rgba(35, 103, 101, 0.18), rgba(141, 47, 37, 0.08)),
    rgba(255, 248, 232, 0.86);
  display: grid;
  place-items: center;
  align-content: center;
  color: var(--muted);
  box-shadow:
    inset 0 -8px 0 rgba(38, 29, 22, 0.08),
    0 6px 14px rgba(56, 38, 21, 0.14);
}

.queue-image-placeholder.configured {
  object-fit: cover;
  padding: 0;
  border-style: solid;
  background: #f8edd4;
}

.queue-image-placeholder span {
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: var(--teal);
  color: #fff8e8;
  font-size: 20px;
  font-weight: 800;
}

.queue-image-placeholder small {
  font-family: ui-sans-serif, system-ui, sans-serif;
  margin-top: -8px;
  font-size: 9px;
}

.queue-floor-shadow {
  width: 58px;
  height: 9px;
  margin-top: -1px;
  border-radius: 50%;
  background: rgba(38, 29, 22, 0.16);
  filter: blur(3px);
}

.queue-nameplate {
  width: 100%;
  min-height: 62px;
  padding: 8px 9px;
  border: 1px solid rgba(63, 45, 31, 0.18);
  border-radius: 6px;
  background: rgba(255, 250, 235, 0.9);
  box-shadow: 0 8px 20px rgba(56, 38, 21, 0.08);
}

.queue-person.at-counter .queue-nameplate {
  background: #f5e2ba;
  border-color: rgba(141, 47, 37, 0.36);
}

.queue-nameplate strong,
.queue-nameplate span,
.queue-nameplate b {
  display: block;
}

.queue-nameplate strong {
  font-size: 15px;
  line-height: 1.2;
}

.queue-nameplate span {
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.25;
}

.queue-nameplate b {
  margin-top: 6px;
  color: var(--red);
  font-size: 12px;
}

.queue-nameplate i {
  display: block;
  height: 7px;
  margin-top: 8px;
  border-radius: 999px;
  background: rgba(62, 46, 30, 0.14);
  overflow: hidden;
}

.queue-nameplate i em {
  display: block;
  width: var(--patience);
  height: 100%;
  border-radius: inherit;
  background: var(--green);
}

.patience {
  height: 8px;
  margin-top: 12px;
  border-radius: 999px;
  background: rgba(62, 46, 30, 0.15);
  overflow: hidden;
}

.patience i {
  display: block;
  height: 100%;
  border-radius: inherit;
  transition: width 0.3s ease;
}

.patience .good {
  background: var(--green);
}

.patience .warn {
  background: var(--gold);
}

.patience .bad {
  background: var(--red);
}

.npc-scene {
  position: absolute;
  inset: 0 0 236px;
  display: grid;
  grid-template-columns: minmax(240px, 0.8fr) minmax(260px, 1fr);
  align-items: end;
  gap: 16px;
  padding: 28px 28px 8px;
}

.npc-art {
  min-height: 410px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
}

.portrait-placeholder {
  width: min(310px, 82%);
  aspect-ratio: 0.72;
  border: 2px dashed rgba(38, 29, 22, 0.28);
  border-radius: 8px 8px 34px 34px;
  background:
    linear-gradient(145deg, rgba(35, 103, 101, 0.16), rgba(141, 47, 37, 0.08)),
    #e9dcc0;
  display: grid;
  place-items: center;
  align-content: center;
  gap: 10px;
  color: rgba(38, 29, 22, 0.72);
}

.portrait-placeholder.configured {
  object-fit: cover;
  padding: 0;
  border-style: solid;
}

.portrait-placeholder span {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: var(--teal);
  color: #fff8e8;
  font-size: 48px;
  font-weight: 800;
}

.portrait-placeholder small {
  font-family: ui-sans-serif, system-ui, sans-serif;
  font-size: 12px;
  color: var(--muted);
}

.npc-shadow {
  width: 72%;
  height: 22px;
  margin-top: -10px;
  border-radius: 50%;
  background: rgba(38, 29, 22, 0.18);
  filter: blur(6px);
}

.npc-info {
  align-self: center;
  max-width: 420px;
  padding: 18px;
  border: 1px solid rgba(63, 45, 31, 0.18);
  border-radius: 8px;
  background: rgba(255, 248, 232, 0.68);
}

.npc-info p,
.npc-info h2 {
  margin: 0;
}

.npc-info p {
  color: var(--red);
  font-size: 14px;
}

.npc-info h2 {
  margin-top: 4px;
  font-size: 42px;
  line-height: 1.1;
}

.npc-info span,
.npc-info b {
  display: block;
  margin-top: 8px;
  color: var(--muted);
  line-height: 1.5;
}

.npc-info b {
  color: #3d3127;
  font-weight: 700;
}

.dialogue-box {
  position: absolute;
  left: 20px;
  right: 20px;
  bottom: 20px;
  min-height: 228px;
  padding: 16px;
  border: 2px solid rgba(63, 45, 31, 0.24);
  border-radius: 8px;
  background: rgba(255, 248, 232, 0.96);
  box-shadow: 0 14px 34px rgba(56, 38, 21, 0.2);
}

.audio-focus {
  position: relative;
  z-index: 2;
  width: min(820px, calc(100% - 48px));
  margin: 0 auto 112px;
  padding: 18px;
  border: 2px solid rgba(141, 47, 37, 0.28);
  border-radius: 8px;
  background: rgba(255, 248, 232, 0.86);
  box-shadow: 0 18px 48px rgba(56, 38, 21, 0.18);
  backdrop-filter: blur(2px);
}

.speaker-line {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: center;
  margin-bottom: 10px;
}

.speaker-line strong {
  font-size: 20px;
  color: var(--red);
}

.speaker-line span {
  color: var(--muted);
  font-size: 13px;
}

.audio-strip {
  min-height: 72px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: #2f3e3d;
  display: grid;
  grid-template-columns: 1fr 52px;
  align-items: center;
  gap: 10px;
  padding: 12px;
}

.waves {
  height: 52px;
  display: flex;
  align-items: center;
  gap: 5px;
  overflow: hidden;
}

.waves i {
  width: 5px;
  height: var(--wave-height);
  border-radius: 99px;
  background: #e8d49c;
  opacity: 0.72;
  transform-origin: center;
  transition:
    background 0.2s ease,
    opacity 0.2s ease;
}

.audio-strip.playing .waves i {
  animation: wave-pulse 0.78s ease-in-out infinite;
  animation-delay: var(--wave-delay);
}

.audio-strip.playing .waves i:nth-child(odd) {
  background: #f7edc9;
}

.audio-strip.playing .waves i:nth-child(3n) {
  animation-duration: 0.64s;
}

.audio-strip.playing .waves i:nth-child(4n) {
  animation-duration: 0.92s;
}

@keyframes wave-pulse {
  0%,
  100% {
    transform: scaleY(0.42);
    opacity: 0.48;
  }

  45% {
    transform: scaleY(1.18);
    opacity: 1;
  }

  70% {
    transform: scaleY(0.72);
    opacity: 0.78;
  }
}

.icon-btn {
  width: 44px;
  padding: 0;
  background: #f5e2ba;
}

.spoken {
  margin-top: 12px;
  padding: 14px;
  min-height: 84px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: rgba(255, 250, 235, 0.72);
  line-height: 1.75;
}

.transcript:not(.show) {
  color: var(--muted);
  font-style: italic;
}

.spoken p {
  margin: 0;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1.25fr;
  gap: 10px;
  margin-top: 12px;
}

.answer,
.hint-box {
  margin: 12px 0 0;
  border-radius: 8px;
  line-height: 1.6;
}

.answer {
  padding: 10px 12px;
  background: rgba(35, 103, 101, 0.12);
  border: 1px solid rgba(35, 103, 101, 0.24);
}

.hint-box {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  padding: 11px 12px;
  background: rgba(141, 47, 37, 0.1);
  border: 1px solid rgba(141, 47, 37, 0.22);
  color: #5a251f;
}

.letter-panel {
  display: flex;
  flex-direction: column;
}

.letter-drawer {
  min-width: 0;
  transform: translateX(18px);
  opacity: 0;
  pointer-events: none;
  transition:
    transform 0.22s ease,
    opacity 0.22s ease;
}

.letter-drawer.visible {
  transform: translateX(0);
  opacity: 1;
  pointer-events: auto;
}

.locked-paper {
  flex: 1;
  min-height: 460px;
  display: grid;
  place-items: center;
  align-content: center;
  gap: 10px;
  padding: 28px;
  text-align: center;
  color: var(--muted);
  border: 1px dashed rgba(112, 80, 45, 0.32);
  border-radius: 8px;
  background: rgba(255, 248, 232, 0.52);
}

.locked-paper strong {
  color: var(--ink);
  font-size: 22px;
}

.locked-paper p {
  margin: 0;
  line-height: 1.7;
}

textarea {
  resize: none;
  flex: 1;
  width: 100%;
  min-height: 460px;
  padding: 24px 28px;
  border: 1px solid rgba(112, 80, 45, 0.32);
  border-radius: 8px;
  outline: none;
  color: #2d2118;
  font-size: 20px;
  line-height: 2;
  background:
    repeating-linear-gradient(to bottom, transparent, transparent 39px, rgba(100, 72, 39, 0.18) 40px),
    var(--paper-strong);
}

textarea:focus {
  border-color: rgba(141, 47, 37, 0.55);
  box-shadow: 0 0 0 3px rgba(141, 47, 37, 0.12);
}

.letter-footer {
  min-height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding-top: 12px;
  color: var(--muted);
}

.primary {
  background: var(--red);
  color: #fff8e8;
  border-color: rgba(62, 19, 14, 0.32);
}

.primary:hover {
  background: #a23a2f;
}

.wide {
  width: 100%;
}

.toast {
  position: fixed;
  left: 18px;
  bottom: 18px;
  width: min(420px, calc(100vw - 36px));
  padding: 14px;
  border-radius: 8px;
  background: rgba(255, 248, 232, 0.96);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
}

.toast div {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}

.toast span {
  color: var(--muted);
}

.toast strong {
  font-size: 24px;
  color: var(--red);
}

.toast p {
  margin: 8px 0 0;
  line-height: 1.5;
}

.bad-text {
  color: var(--red);
}

.asset-tool {
  position: fixed;
  top: 112px;
  right: 18px;
  z-index: 20;
  width: min(520px, calc(100vw - 36px));
  max-height: calc(100vh - 136px);
  display: flex;
  flex-direction: column;
  padding: 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 248, 232, 0.98);
  box-shadow: var(--shadow);
}

.asset-tool-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.asset-tool-head span,
.asset-help,
.asset-person span,
.asset-fields label span {
  color: var(--muted);
}

.asset-tool-head strong {
  display: block;
  margin-top: 2px;
  font-size: 24px;
  color: var(--ink);
}

.asset-tool-head button {
  width: 38px;
  min-height: 38px;
  padding: 0;
  font-size: 24px;
}

.asset-help {
  margin: 10px 0 14px;
  line-height: 1.6;
}

.asset-list {
  overflow: auto;
  padding-right: 4px;
}

.asset-row {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 12px;
  padding: 12px;
  border: 1px solid rgba(63, 45, 31, 0.16);
  border-radius: 8px;
  background: rgba(255, 250, 235, 0.78);
}

.asset-row + .asset-row {
  margin-top: 10px;
}

.asset-person strong {
  display: block;
  font-size: 18px;
}

.asset-person span {
  display: block;
  margin-top: 4px;
  line-height: 1.4;
  font-size: 13px;
}

.asset-fields {
  display: grid;
  gap: 8px;
}

.asset-fields label {
  display: grid;
  gap: 5px;
}

.asset-fields label span {
  font-size: 13px;
}

.asset-path {
  width: 100%;
  min-height: 38px;
  padding: 0 10px;
  border: 1px solid rgba(112, 80, 45, 0.28);
  border-radius: 6px;
  background: #fffaf0;
  color: var(--ink);
}

.asset-buttons {
  display: grid;
  grid-template-columns: 1fr 72px;
  gap: 8px;
}

.asset-file {
  min-width: 0;
  padding: 8px;
  border: 1px dashed rgba(112, 80, 45, 0.3);
  border-radius: 6px;
  background: rgba(255, 248, 232, 0.72);
}

.asset-clear {
  min-height: 38px;
}

.summary-screen {
  display: grid;
  place-items: center;
}

.summary-panel {
  width: min(980px, 100%);
  padding: 28px;
}

.summary-panel h1 {
  margin: 0;
  font-size: 38px;
}

.summary-copy {
  line-height: 1.8;
  color: var(--muted);
  max-width: 760px;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin: 22px 0;
}

.result-card {
  min-height: 128px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 250, 235, 0.68);
}

.result-card span {
  color: var(--muted);
}

.result-card strong {
  float: right;
  font-size: 28px;
  color: var(--red);
}

.result-card p,
.departed {
  line-height: 1.6;
}

.departed {
  color: var(--red);
}

@media (max-width: 1080px) {
  .topbar {
    height: auto;

      rule("不要卖地契", ["地契", "卖地", "莫卖"], 14, "保住地契的请求写清。"),
    ],
    forbidden: [
      rule("逃工直写", ["逃工", "逃了", "工棚"], 16, "直写逃工会惹来追查。"),
      rule("帮会直写", ["帮会", "私会", "黑账"], 14, "敏感词太直白，风险很高。"),
    ],
    toneTerms: ["平安", "周旋", "缓", "勿惊", "暂且"],
    formatTerms: ["大哥", "谨启", "平安信"],
    successEvent: "梁德成回批说旧账暂缓，家中地契保住了。",
    failureEvent: "信里露出逃工字眼，陈掌柜的人先一步找到了梁家。",
  },
];

function rule(label, terms, weight, feedback) {
  return { label, terms, weight, feedback };
}

const daySeconds = 9 * 60;
const assetStorageKey = "yin-xin-placeholder-assets";
let state = createInitialState();
let timer = null;

function loadAssetConfig() {
  try {
    return JSON.parse(localStorage.getItem(assetStorageKey) || "{}");
  } catch (error) {
    return {};
  }
}

function saveAssetConfig(config) {
  localStorage.setItem(assetStorageKey, JSON.stringify(config));
}

function createInitialState() {
  return {
    queue: customers.map((customer) => ({ ...customer })),
    currentIndex: 0,
    dayTime: daySeconds,
    customerTime: 0,
    letter: "",
    money: 0,
    reputation: 52,
    isPlaying: false,
    hasListened: false,
    isPaperOpen: false,
    hasAsked: false,
    lastResult: null,
    completed: [],
    departed: [],
    isDayEnded: false,
    isAssetToolOpen: false,
    assetConfig: loadAssetConfig(),
  };
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function normalize(text) {
  return text.toLowerCase().replace(/\s/g, "");
}

function hasAny(text, terms) {
  return terms.some((term) => text.includes(term.toLowerCase()));
}

function evaluateLetter(customer, letter, secondsUsed) {
  const text = normalize(letter);
  const maxFact = customer.required.reduce((sum, item) => sum + item.weight, 0);
  let factPoints = 0;
  let forbiddenPenalty = 0;
  const positive = [];
  const negative = [];

  customer.required.forEach((item) => {
    if (hasAny(text, item.terms)) {
      factPoints += item.weight;
      positive.push(item.feedback);
    } else {
      negative.push(`漏写：${item.label}`);
    }
  });

  customer.forbidden.forEach((item) => {
    if (hasAny(text, item.terms)) {
      forbiddenPenalty += item.weight;
      negative.push(item.feedback);
    }
  });

  const factScore = clamp(Math.round((factPoints / maxFact) * 100 - forbiddenPenalty), 0, 100);
  const intentScore = clamp(Math.round((factPoints / maxFact) * 88 + (negative.length === 0 ? 12 : 0)), 0, 100);
  const toneHits = customer.toneTerms.filter((term) => text.includes(term.toLowerCase())).length;
  const toneScore = clamp(46 + toneHits * 14 - forbiddenPenalty, 0, 100);
  const formatHits = customer.formatTerms.filter((term) => text.includes(term.toLowerCase())).length;
  const formatScore = clamp(42 + formatHits * 14, 0, 100);
  const idealSeconds = 68 + customer.complexity * 18;
  const timePenalty = clamp(Math.round(Math.max(0, secondsUsed - idealSeconds) / 8), 0, 16);
  const finalScore = clamp(
    Math.round(factScore * 0.42 + intentScore * 0.24 + toneScore * 0.18 + formatScore * 0.16 - timePenalty),
    0,
    100,
  );
  const feedback = [`事实准确度 ${factScore}`, `意图符合度 ${intentScore}`, `语气匹配度 ${toneScore}`, `文体适配度 ${formatScore}`];

  if (timePenalty > 0) feedback.push(`用时偏久，扣 ${timePenalty} 分`);
  if (letter.trim().length < 48) feedback.push("信件太短，像柜台便条，不像能寄回乡里的番批。");

  return { factScore, intentScore, toneScore, formatScore, timePenalty, finalScore, feedback, positive, negative };
}

function currentCustomer() {
  return state.queue[state.currentIndex];
}

function formatClock(seconds) {
  const startHour = 8;
  const elapsedMinutes = Math.floor((daySeconds - seconds) / 6);
  const hour = startHour + Math.floor(elapsedMinutes / 60);
  const minute = elapsedMinutes % 60;
  return `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
}

function patienceColor(value) {
  if (value > 62) return "good";
  if (value > 32) return "warn";
  return "bad";
}

function spendTime(seconds) {
  state.dayTime = Math.max(0, state.dayTime - seconds);
  state.customerTime += seconds;
  if (state.dayTime <= 0) state.isDayEnded = true;
}

function tick() {
  if (state.isDayEnded || !currentCustomer()) return;
  state.dayTime = Math.max(0, state.dayTime - 1);
  state.customerTime += 1;

  state.queue = state.queue.filter((customer, index) => {
    if (index <= state.currentIndex) return true;
    const drain = 0.015 + customer.urgency / 9000 + customer.complexity / 260;
    customer.patience = Math.max(0, customer.patience - drain);
    if (customer.patience > 0) return true;
    state.departed.push(customer);
    state.reputation = Math.max(0, state.reputation - 3);
    return false;
  });

  if (state.dayTime <= 0) state.isDayEnded = true;
  render();
}

function playAudio() {
  if (!currentCustomer() || state.isPlaying) return;
  state.isPlaying = true;
  state.hasListened = true;
  spendTime(12);
  render();
  window.setTimeout(() => {
    state.isPlaying = false;
    render();
  }, 900);
}

function askQuestion() {
  if (!currentCustomer() || state.hasAsked) return;
  state.hasAsked = true;
  spendTime(18);
  render();
}

function submitLetter() {
  const customer = currentCustomer();
  if (!customer || state.isDayEnded) return;
  const letterBox = document.querySelector("#letterBox");
  state.letter = letterBox ? letterBox.value : state.letter;
  const evaluation = evaluateLetter(customer, state.letter, state.customerTime);
  const earned = evaluation.finalScore >= 72 ? customer.payment : Math.max(1, Math.round(customer.payment * 0.45));
  const reputationShift = evaluation.finalScore >= 82 ? 4 : evaluation.finalScore >= 62 ? 1 : -4;
  const result = { customer, letter: state.letter, evaluation, secondsUsed: state.customerTime };

  state.money += earned;
  state.reputation = clamp(state.reputation + reputationShift, 0, 100);
  state.completed.push(result);
  state.lastResult = result;
  state.letter = "";
  state.hasAsked = false;
  state.hasListened = false;
  state.isPaperOpen = false;
  state.customerTime = 0;
  state.currentIndex += 1;
  if (state.currentIndex >= state.queue.length) state.isDayEnded = true;
  render();
}

function resetDay() {
  state = createInitialState();
  startTimer();
  render();
}

function startTimer() {
  if (timer) window.clearInterval(timer);
  timer = window.setInterval(tick, 1000);
}

function icon(label) {
  return `<span class="icon">${label}</span>`;
}

function escapeAttr(value) {
  return String(value || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
}

function getAsset(customerId, kind) {
  return state.assetConfig[customerId]?.[kind] || "";
}

function setAsset(customerId, kind, value) {
  state.assetConfig = {
    ...state.assetConfig,
    [customerId]: {
      ...(state.assetConfig[customerId] || {}),
      [kind]: value,
    },
  };
  saveAssetConfig(state.assetConfig);
  render();
}

function clearAsset(customerId, kind) {
  setAsset(customerId, kind, "");
}

function readAssetFile(customerId, kind, file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => setAsset(customerId, kind, String(reader.result || ""));
  reader.readAsDataURL(file);
}

function assetImageOrPlaceholder(customer, kind, className, label) {
  const src = getAsset(customer.id, kind);
  if (src) {
    return `<img class="${className} configured" src="${escapeAttr(src)}" alt="${escapeAttr(customer.name)} ${label}" />`;
  }
  if (kind === "npc") {
    return `
      <div class="${className}">
        <span>${customer.name.slice(0, 1)}</span>
        <small>NPC IMAGE</small>
      </div>
    `;
  }
  return `
    <div class="${className}">
      <span>${customer.name.slice(0, 1)}</span>
      <small>TOP</small>
    </div>
  `;
}

function queuePerson(customer, index, isActive) {
  const patience = Math.round(customer.patience);
  return `
    <article class="queue-person ${isActive ? "at-counter" : ""}" style="--step:${index}; --patience:${patience}%">
      <div class="queue-character">
        ${assetImageOrPlaceholder(customer, "queue", "queue-image-placeholder", "队列图")}
        <div class="queue-floor-shadow"></div>
      </div>
      <div class="queue-nameplate">
        <strong>${customer.name}</strong>
        <span>${customer.role}</span>
        ${isActive ? "<b>柜台</b>" : `<i><em></em></i>`}
      </div>
    </article>
  `;
}

function openPaper() {
  if (!currentCustomer() || !state.hasListened) return;
  state.isPaperOpen = true;
  render();
}

function toggleAssetTool() {
  state.isAssetToolOpen = !state.isAssetToolOpen;
  render();
}

function renderAssetTool() {
  if (!state.isAssetToolOpen) return "";
  return `
    <aside class="asset-tool">
      <div class="asset-tool-head">
        <div>
          <span>Placeholder 工具</span>
          <strong>图片配置</strong>
        </div>
        <button id="closeAssetTool" title="关闭">×</button>
      </div>
      <p class="asset-help">为每位客人分别配置 NPC 立绘和队列俯视图。可粘贴相对路径、绝对路径、URL，或选择本地图片存入浏览器缓存。</p>
      <div class="asset-list">
        ${customers
          .map((customer) => {
            const npcValue = getAsset(customer.id, "npc");
            const queueValue = getAsset(customer.id, "queue");
            return `
              <section class="asset-row" data-customer="${customer.id}">
                <div class="asset-person">
                  <strong>${customer.name}</strong>
                  <span>${customer.role}</span>
                </div>
                <div class="asset-fields">
                  <label>
                    <span>NPC 立绘</span>
                    <input class="asset-path" data-id="${customer.id}" data-kind="npc" value="${escapeAttr(npcValue)}" placeholder="./images/${customer.id}-npc.png" />
                  </label>
                  <div class="asset-buttons">
                    <input class="asset-file" data-id="${customer.id}" data-kind="npc" type="file" accept="image/*" />
                    <button class="asset-clear" data-id="${customer.id}" data-kind="npc">清空</button>
                  </div>
                  <label>
                    <span>队列俯视图</span>
                    <input class="asset-path" data-id="${customer.id}" data-kind="queue" value="${escapeAttr(queueValue)}" placeholder="./images/${customer.id}-top.png" />
                  </label>
                  <div class="asset-buttons">
                    <input class="asset-file" data-id="${customer.id}" data-kind="queue" type="file" accept="image/*" />
                    <button class="asset-clear" data-id="${customer.id}" data-kind="queue">清空</button>
                  </div>
                </div>
              </section>
            `;
          })
          .join("")}
      </div>
    </aside>
  `;
}

function bindAssetTool() {
  const openButton = document.querySelector("#assetToolBtn");
  if (openButton) openButton.addEventListener("click", toggleAssetTool);

  const closeButton = document.querySelector("#closeAssetTool");
  if (closeButton) closeButton.addEventListener("click", toggleAssetTool);

  document.querySelectorAll(".asset-path").forEach((input) => {
    input.addEventListener("change", (event) => {
      const target = event.target;
      setAsset(target.dataset.id, target.dataset.kind, target.value.trim());
    });
  });

  document.querySelectorAll(".asset-file").forEach((input) => {
    input.addEventListener("change", (event) => {
      const target = event.target;
      readAssetFile(target.dataset.id, target.dataset.kind, target.files?.[0]);
    });
  });

  document.querySelectorAll(".asset-clear").forEach((button) => {
    button.addEventListener("click", (event) => {
      const target = event.currentTarget;
      clearAsset(target.dataset.id, target.dataset.kind);
    });
  });
}

function renderSummary(root) {
  const avgScore = state.completed.length
    ? Math.round(state.completed.reduce((sum, item) => sum + item.evaluation.finalScore, 0) / state.completed.length)
    : 0;
  root.innerHTML = `
    <main class="app summary-screen">
      <section class="summary-panel">
        <div>
          <p class="eyebrow">今日收柜</p>
          <h1>南洋埠头的船灯暗下来了</h1>
          <p class="summary-copy">你完成了 ${state.completed.length} 封番批，${state.departed.length} 位客人等不及离开。平均信件评分 ${avgScore}，今日收入 ${state.money} 元，银信局声誉 ${state.reputation}。</p>
        </div>
        <div class="summary-grid">
          ${state.completed
            .map(
              (item) => `
                <article class="result-card">
                  <span>${item.customer.role}</span>
                  <strong>${item.evaluation.finalScore}</strong>
                  <p>${item.evaluation.finalScore >= 68 ? item.customer.successEvent : item.customer.failureEvent}</p>
                </article>
              `,
            )
            .join("")}
        </div>
        ${state.departed.length > 0 ? `<p class="departed">离队：${state.departed.map((item) => item.name).join("、")}</p>` : ""}
        <button class="primary wide" id="resetBtn">${icon("↻")}重新开柜</button>
      </section>
    </main>
  `;
  document.querySelector("#resetBtn").addEventListener("click", resetDay);
}

function renderGame(root) {
  const current = currentCustomer();
  const waitingQueue = state.queue.slice(state.currentIndex + 1);
  const shipDeadline = Math.max(0, state.dayTime - 105);

  root.innerHTML = `
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <span class="seal">银</span>
          <div>
            <p>南洋埠头</p>
            <h1>银信局写信员</h1>
          </div>
        </div>
        <div class="metrics">
          <div>${icon("◷")}<span>${formatClock(state.dayTime)}</span></div>
          <div>${icon("舶")}<span>船期 ${Math.ceil(shipDeadline / 60)} 分</span></div>
          <div>${icon("钱")}<span>${state.money} 元</span></div>
          <div>${icon("誉")}<span>声誉 ${state.reputation}</span></div>
          <button class="tool-toggle" id="assetToolBtn">${icon("图")}图片</button>
        </div>
      </header>

      <section class="dialogue-layout ${state.isPaperOpen ? "paper-open" : ""}">
        <aside class="queue-rail">
          <div class="panel-title">${icon("队")}<span>柜前队伍</span></div>
          <div class="queue-scene">
            <div class="counter-marker">柜台</div>
            <div class="queue-line"></div>
            ${[current, ...waitingQueue].map((customer, index) => queuePerson(customer, index, index === 0)).join("")}
          </div>
        </aside>

        <section class="dialogue-stage">
          <div class="npc-scene">
            <div class="npc-art" aria-label="NPC placeholder">
              ${assetImageOrPlaceholder(current, "npc", "portrait-placeholder", "立绘")}
              <div class="npc-shadow"></div>
            </div>
            <div class="npc-info">
              <p>${current.origin}</p>
              <h2>${current.name}</h2>
              <span>${current.role} · ${current.letterType}</span>
              <b>寄往：${current.destination}</b>
            </div>
          </div>

          <div class="audio-focus" aria-label="客人口述语音">
            <div class="speaker-line">
              <strong>${current.name}</strong>
              <span>${state.hasListened ? "语音已听取" : "等待听取口述"}</span>
            </div>
            <div class="audio-strip ${state.isPlaying ? "playing" : ""}">
              <div class="waves">
                ${Array.from(
                  { length: 56 },
                  (_, index) =>
                    `<i style="--wave-height:${18 + ((index * 13) % 38)}px; --wave-delay:${(index % 14) * 0.045}s"></i>`,
                ).join("")}
              </div>
              <button class="icon-btn" id="playBtn" title="播放语音">${icon("听")}</button>
            </div>
          </div>

          <div class="dialogue-box">
            <div class="speaker-line">
              <strong>${current.name}</strong>
              <span>${state.hasListened ? "语音已听取" : "等待听取口述"}</span>
            </div>
            <div class="spoken transcript ${state.hasListened ? "show" : ""}">
              <p>${state.hasListened ? current.audioText : "点击语音条听取客人口述。听完后，信纸才会展开。"}</p>
            </div>
            <div class="actions">
              <button id="replayBtn">${icon("↻")}重听耗时</button>
              <button id="askBtn" ${state.hasAsked ? "disabled" : ""}>${icon("?")}追问</button>
              <button class="primary" id="openPaperBtn" ${state.hasListened ? "" : "disabled"}>${icon("信")}打开信纸</button>
            </div>
            ${state.hasAsked ? `<p class="answer">${current.askAnswer}</p>` : ""}
            <div class="hint-box">${icon("!")}<span>${current.promptHint}</span></div>
          </div>
        </section>

        <section class="letter-panel letter-drawer ${state.isPaperOpen ? "visible" : ""}" aria-hidden="${state.isPaperOpen ? "false" : "true"}">
          <div class="panel-title">${icon("信")}<span>信纸记录</span></div>
          ${
            state.isPaperOpen
              ? `
                <textarea id="letterBox" placeholder="在此代客写信。记清银钱、人名、村名和托付，也要顾住语气。">${state.letter}</textarea>
                <div class="letter-footer">
                  <span>当前用时 ${state.customerTime} 秒</span>
                  <button class="primary" id="submitBtn">${icon("封")}封信交付</button>
                </div>
              `
              : `
                <div class="locked-paper">
                  <span>${icon("听")}</span>
                  <strong>先听完客人口述</strong>
                  <p>语音听取后，信纸会从柜台展开，开始记录与润色。</p>
                </div>
              `
          }
        </section>
      </section>

      ${
        state.lastResult
          ? `
            <aside class="toast">
              <div><span>上一封：${state.lastResult.customer.role}</span><strong>${state.lastResult.evaluation.finalScore} 分</strong></div>
              <p>${state.lastResult.evaluation.positive.slice(0, 2).join("；") || "内容仍需斟酌。"}</p>
              ${state.lastResult.evaluation.negative.length > 0 ? `<p class="bad-text">${state.lastResult.evaluation.negative[0]}</p>` : ""}
            </aside>
          `
          : ""
      }
      ${renderAssetTool()}
    </main>
  `;

  const letterBox = document.querySelector("#letterBox");
  if (letterBox) {
    letterBox.addEventListener("input", (event) => {
      state.letter = event.target.value;
    });
  }
  document.querySelector("#playBtn").addEventListener("click", playAudio);
  document.querySelector("#replayBtn").addEventListener("click", playAudio);
  document.querySelector("#askBtn").addEventListener("click", askQuestion);
  document.querySelector("#openPaperBtn").addEventListener("click", openPaper);
  const submitBtn = document.querySelector("#submitBtn");
  if (submitBtn) submitBtn.addEventListener("click", submitLetter);
  bindAssetTool();
}

function render() {
  const root = document.querySelector("#root");
  if (!root) return;
  if (state.isDayEnded || !currentCustomer()) {
    if (timer) window.clearInterval(timer);
    renderSummary(root);
    return;
  }
  renderGame(root);
}

startTimer();
render();
</script>
  </body>
</html>
